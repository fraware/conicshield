name: inter-sim-rl-ci

# Clone URL: `repository=` in third_party/inter-sim-rl/REVISION, unless repository
# variable INTERSIM_RL_REPO_URL is set (fork experiments without editing REVISION).

on:
  workflow_dispatch:

jobs:
  inter-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ConicShield (no solver)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Resolve INTERSIM_RL_ROOT (clone + M2 patch, submodule, or repo variable)
        env:
          INTERSIM_RL_VAR: ${{ vars.INTERSIM_RL_ROOT }}
          INTERSIM_RL_REPO_URL: ${{ vars.INTERSIM_RL_REPO_URL }}
        run: |
          if [ -n "${INTERSIM_RL_VAR}" ] && [ -d "${INTERSIM_RL_VAR}" ]; then
            echo "INTERSIM_RL_ROOT=${INTERSIM_RL_VAR}" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -d third_party/inter-sim-rl/checkout ]; then
            echo "INTERSIM_RL_ROOT=${GITHUB_WORKSPACE}/third_party/inter-sim-rl/checkout" >> "$GITHUB_ENV"
            exit 0
          fi
          REV_FILE="${GITHUB_WORKSPACE}/third_party/inter-sim-rl/REVISION"
          SHA=$(grep '^sha=' "$REV_FILE" | cut -d= -f2)
          REPO=$(grep '^repository=' "$REV_FILE" | cut -d= -f2-)
          if [ -n "${INTERSIM_RL_REPO_URL}" ]; then
            REPO="${INTERSIM_RL_REPO_URL}"
          fi
          git clone "$REPO" /tmp/inter-sim-rl
          cd /tmp/inter-sim-rl
          git checkout "$SHA"
          git apply "${GITHUB_WORKSPACE}/third_party/inter-sim-rl/patches/conicshield-m2-shield-context-and-transitions.patch"
          echo "INTERSIM_RL_ROOT=/tmp/inter-sim-rl" >> "$GITHUB_ENV"
      - name: Try apply M2 patch on submodule checkout (no-op if already merged)
        run: |
          ROOT="${INTERSIM_RL_ROOT}"
          if [ -d "${ROOT}/.git" ]; then
            git -C "${ROOT}" apply "${GITHUB_WORKSPACE}/third_party/inter-sim-rl/patches/conicshield-m2-shield-context-and-transitions.patch" 2>/dev/null || true
          fi
      - name: Upstream tests (numpy + jsonschema only, no TensorFlow)
        run: |
          python -m pip install numpy jsonschema pytest -q
          export PYTHONPATH="${INTERSIM_RL_ROOT}${PYTHONPATH:+:${PYTHONPATH}}"
          cd "${INTERSIM_RL_ROOT}"
          python -m pytest tests/test_rl_environment_shield.py tests/test_reward.py tests/test_state_representation.py tests/test_config.py -q
      - name: Smoke — RLEnvironment exposes get_shield_context (M2 seam)
        run: |
          export PYTHONPATH="${INTERSIM_RL_ROOT}${PYTHONPATH:+:${PYTHONPATH}}"
          python -c "from inter_sim_rl.rl_environment import RLEnvironment; assert callable(getattr(RLEnvironment, 'get_shield_context', None)), 'get_shield_context missing'; print('OK: RLEnvironment.get_shield_context')"
      - name: ConicShield tests marked inter_sim_rl
        run: |
          export PYTHONPATH="${INTERSIM_RL_ROOT}:${PYTHONPATH:-}"
          cd "${GITHUB_WORKSPACE}"
          python -m pytest tests/ -q -m inter_sim_rl
