name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locked dev tools and project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check conicshield tests
      - name: Ruff format
        run: python -m ruff format --check conicshield tests
      - name: Mypy
        run: python -m mypy conicshield tests
      - name: Public/reference tests with coverage
        run: python -m pytest tests/ -q --cov=conicshield --cov-report=term-missing
      - name: Verification scripts (public smoke artifacts)
        if: success() || failure()
        run: |
          python scripts/environment_check.py
          python scripts/smoke_check.py
          python scripts/differentiation_check.py
          python scripts/generate_trust_dashboard.py
      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: verification-output-${{ matrix.python-version }}
          path: output/
          if-no-files-found: warn
