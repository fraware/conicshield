name: publish-benchmark

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run directory name under benchmarks/runs/"
        required: true
        type: string
      family_id:
        description: "Benchmark family id"
        required: true
        default: "conicshield-transition-bank-v1"
        type: string
      reason:
        description: "Release reason"
        required: true
        default: "promoted after green artifact and governance gates"
        type: string
      parity_summary_path:
        description: "Optional parity summary path (relative to repo)"
        required: false
        default: ""
        type: string
      solver_versions_path:
        description: "Optional solver_versions.json path (relative to repo)"
        required: false
        default: ""
        type: string
      solver_version_date_utc:
        description: "Optional date for ENGINEERING_STATUS rows (YYYY-MM-DD)"
        required: false
        default: ""
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e ".[dev]"
      - name: Ensure governance decision record exists
        env:
          RUN_ID: ${{ inputs.run_id }}
        run: |
          test -f "benchmarks/runs/${RUN_ID}/governance_decision.md"
      - name: Publish governed benchmark run
        env:
          RUN_ID: ${{ inputs.run_id }}
          FAMILY_ID: ${{ inputs.family_id }}
          REASON: ${{ inputs.reason }}
          PARITY_SUMMARY_PATH: ${{ inputs.parity_summary_path }}
          SOLVER_VERSIONS_PATH: ${{ inputs.solver_versions_path }}
          SOLVER_VERSION_DATE_UTC: ${{ inputs.solver_version_date_utc }}
        run: |
          CMD=(python scripts/execute_real_publish_chain.py \
            --run-dir "benchmarks/runs/${RUN_ID}" \
            --family-id "${FAMILY_ID}" \
            --reason "${REASON}")
          if [ -n "${PARITY_SUMMARY_PATH}" ]; then
            CMD+=(--parity-summary-path "${PARITY_SUMMARY_PATH}")
          fi
          if [ -n "${SOLVER_VERSIONS_PATH}" ]; then
            CMD+=(--solver-versions "${SOLVER_VERSIONS_PATH}")
          fi
          if [ -n "${SOLVER_VERSION_DATE_UTC}" ]; then
            CMD+=(--solver-version-date-utc "${SOLVER_VERSION_DATE_UTC}")
          fi
          "${CMD[@]}"
      - name: Upload governance state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-governance-state-${{ inputs.run_id }}
          path: |
            benchmarks/registry.json
            benchmarks/releases/**/CURRENT.json
            benchmarks/releases/**/HISTORY.json
            benchmarks/runs/${{ inputs.run_id }}/governance_status.json
            benchmarks/runs/${{ inputs.run_id }}/governance_status.schema.json
            docs/ENGINEERING_STATUS.md
          if-no-files-found: warn
