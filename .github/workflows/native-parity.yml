name: native-parity

on:
  pull_request:
    paths:
      - "conicshield/core/**"
      - "conicshield/specs/**"
      - "conicshield/adapters/inter_sim_rl/**"
      - "conicshield/parity/**"
      - "tests/fixtures/parity_reference/**"
      - ".github/workflows/native-parity.yml"

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - run: pytest tests/test_parity_replay.py -q
